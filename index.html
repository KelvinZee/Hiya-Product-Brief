<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Strategy Brief · Hiya · Kelvin Zee</title>
  <meta name="description" content="A strategy brief on Hiya's enterprise-product opportunity, prepared for the Principal Product Manager role. By Kelvin Zee." />

  <!-- Google Fonts: DM Sans (display, echoes Hiya's paid Eina 01) + Nunito Sans (body, direct from Hiya brand book) + JetBrains Mono (section numbers, stat tabulars) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Nunito+Sans:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Design tokens from the Hiya brief Design Token Spec
    // Colors verified against Hiya brand guidelines (partners.hiya.com brand book)
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#2F1761', // Hiya Neutral Purple (deep aubergine) — brand-book core color
            surface: '#3D2585', // Lifted aubergine for cards/sections above bg
            ink:     '#FFFFFF', // White text on aubergine (brand-book accessibility rule)
            body:    '#E2DAFF', // Warm white with purple cast for body copy
            muted:   '#9F92C7', // Desaturated purple-grey for labels/captions
            accent:  '#6A44B9', // Hiya Logo Purple — the load-bearing brand color
            warn:    '#FF6C29', // Hiya Warning Orange — direct from brand book
            line:    '#4A2B8E', // Lifted aubergine for hairlines
          },
          fontFamily: {
            display: ['"DM Sans"', 'system-ui', 'sans-serif'],
            body:    ['"Nunito Sans"', 'system-ui', 'sans-serif'],
            mono:    ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          letterSpacing: {
            // Hiya brand sets headlines at -25 tracking (Hiya brand book)
            tight25: '-0.025em',
            // Hiya brand sets CTA text at +25 tracking
            wide25:  '0.025em',
            wide100: '0.10em',
          },
        },
      },
    };
  </script>

  <!-- React 18 + ReactDOM + Babel standalone for in-browser JSX (no build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Nunito Sans', system-ui, sans-serif;
      background: #2F1761;
      color: #E2DAFF;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    /* Hero radial — subtle deeper-aubergine glow off-center, replaces grain overlay */
    .hero-radial {
      background:
        radial-gradient(60% 70% at 25% 30%, rgba(106,68,185,0.18) 0%, rgba(47,23,97,0) 70%),
        radial-gradient(40% 50% at 80% 80%, rgba(106,68,185,0.12) 0%, rgba(47,23,97,0) 70%);
    }
    /* Hairline section divider */
    .rule {
      border-top: 1px solid rgba(106,68,185,0.25);
    }
    /* Status-dot indicator (signature motif) */
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 9999px;
      background: #6A44B9;
      box-shadow: 0 0 0 3px rgba(106,68,185,0.18);
      vertical-align: middle;
    }
    /* Hanging quote */
    .hang-quote::before {
      content: '\201C';
      font-family: 'DM Sans', sans-serif;
      color: #6A44B9;
      font-size: 64px;
      line-height: 0.8;
      margin-left: -28px;
      margin-right: 8px;
      vertical-align: -10px;
    }
    /* Custom scrollbar — purple-tinted for editorial feel */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #2F1761; }
    ::-webkit-scrollbar-thumb { background: #4A2B8E; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #6A44B9; }
    /* Focus ring */
    *:focus-visible { outline: 2px solid #6A44B9; outline-offset: 2px; border-radius: 2px; }
    /* Mono tabular numerals */
    .tabnum { font-variant-numeric: tabular-nums; }
    /* Tier toggle styling */
    .tier-btn { transition: background 120ms ease, color 120ms ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useMemo, useRef } = React;

  // ============================================================
  // READING TIERS
  // 0 = Quick (3-min)   1 = Strategist (15-min)   2 = Panel (Full)
  // ============================================================
  const TIER = { quick: 0, strategist: 1, full: 2 };
  const TIER_LABEL = {
    quick:      { name: '3-min',  long: 'Quick',     desc: 'Recruiter scan'   },
    strategist: { name: '15-min', long: 'Strategist',desc: 'Hiring manager'   },
    full:       { name: 'Full Read', long: 'Panel',  desc: 'Peer interview'   },
  };

  // ============================================================
  // SECTION MAP — single source of truth
  // minTier: minimum reading-tier required for the section to render
  // 0 = render always · 1 = strategist + full · 2 = full only
  // ============================================================
  const SECTIONS = [
    { id: 'hero',       num: '01', title: 'TL;DR',                       minTier: 0 },
    { id: 'hypotheses', num: '02', title: 'Hypotheses',                  minTier: 0 },
    { id: 'setup',      num: '03', title: 'The Setup',                   minTier: 1 },
    { id: 'analogy',    num: '04', title: 'The Analogy',                 minTier: 2 },
    { id: 'stack',      num: '05', title: "Today's Trust Stack",         minTier: 1 },
    { id: 'network',    num: '06', title: 'The Hiya Network',            minTier: 1 },
    { id: 'field',      num: '07', title: 'The Field',                   minTier: 2 },
    { id: 'buyer',      num: '08', title: 'The Buyer Shift',             minTier: 2 },
    { id: 'segments',   num: '09', title: 'Segments',                    minTier: 2 },
    { id: 'calculator', num: '10', title: 'Trusted Call Calculator',     minTier: 2 },
    { id: 'framework',  num: '11', title: "Framework I'd Validate",      minTier: 1 },
    { id: 'ninety',     num: '12', title: 'First 90 Days',               minTier: 1 },
    { id: 'questions',  num: '13', title: 'Open Questions',              minTier: 2 },
    { id: 'profile',    num: '14', title: 'Why This Profile',            minTier: 0 },
  ];

  // ============================================================
  // SHARED COMPONENTS
  // ============================================================
  const Dot = ({ tone }) => {
    if (tone === 'warn') {
      return (
        <span
          className="dot"
          style={{ background: '#FF6C29', boxShadow: '0 0 0 3px rgba(255,108,41,0.18)' }}
          aria-hidden="true"
        />
      );
    }
    return <span className="dot" aria-hidden="true" />;
  };

  const Eyebrow = ({ num, label }) => (
    <div className="flex items-center gap-3 text-muted">
      <Dot />
      <span className="font-mono text-xs tabnum tracking-wide100 uppercase">
        §{num}
      </span>
      <span className="font-display font-bold text-xs tracking-wide100 uppercase">
        {label}
      </span>
    </div>
  );

  const SectionShell = ({ sec, children }) => (
    <section id={sec.id} className="scroll-mt-24 py-16 md:py-20">
      <Eyebrow num={sec.num} label={sec.title} />
      <div className="mt-6 md:mt-8">{children}</div>
      <div className="rule mt-16 md:mt-20" />
    </section>
  );

  // Visual placeholder used in undrafted sections.
  // Communicates intent of the section without pretending to be content.
  const Placeholder = ({ kind, lines }) => (
    <div className="border border-dashed border-line/60 rounded-md p-5 md:p-6 bg-surface/30">
      <div className="font-mono text-[11px] tabnum uppercase tracking-wide100 text-muted">
        [ to draft · {kind} ]
      </div>
      <ul className="mt-3 space-y-2 text-body/90">
        {lines.map((l, i) => (
          <li key={i} className="flex gap-3">
            <span className="font-mono text-muted text-xs mt-1 tabnum">{String(i + 1).padStart(2, '0')}</span>
            <span>{l}</span>
          </li>
        ))}
      </ul>
    </div>
  );

  // ============================================================
  // TOP NAV — title, tier toggle, mobile section menu
  // ============================================================
  const TopBar = ({ tier, setTier, onOpenNav }) => {
    return (
      <header className="sticky top-0 z-30 bg-bg/90 backdrop-blur-md border-b border-line/40">
        <div className="max-w-7xl mx-auto px-5 md:px-8 h-14 flex items-center justify-between gap-4">
          <a href="#hero" className="flex items-center gap-3 group">
            <Dot />
            <span className="font-display font-bold text-ink tracking-tight25">
              Strategy&nbsp;Brief
            </span>
            <span className="hidden sm:inline text-muted text-sm">·&nbsp;Hiya&nbsp;·&nbsp;Kelvin&nbsp;Zee</span>
          </a>

          <div className="flex items-center gap-2">
            <TierToggle tier={tier} setTier={setTier} />
            <button
              onClick={onOpenNav}
              className="md:hidden ml-2 px-3 py-1.5 rounded border border-line text-body text-sm hover:bg-surface"
              aria-label="Open section menu"
            >
              §
            </button>
          </div>
        </div>
      </header>
    );
  };

  const TierToggle = ({ tier, setTier }) => {
    const keys = ['quick', 'strategist', 'full'];
    return (
      <div
        className="flex items-center gap-0.5 p-0.5 rounded border border-line bg-surface/50"
        role="tablist"
        aria-label="Reading depth"
      >
        {keys.map((k) => {
          const active = tier === k;
          return (
            <button
              key={k}
              role="tab"
              aria-selected={active}
              onClick={() => setTier(k)}
              className={
                'tier-btn px-2.5 py-1 rounded text-xs font-mono uppercase tracking-wide100 ' +
                (active ? 'bg-accent text-ink' : 'text-muted hover:text-body')
              }
            >
              {TIER_LABEL[k].name}
            </button>
          );
        })}
      </div>
    );
  };

  // ============================================================
  // SIDE NAV — sticky on desktop, modal on mobile
  // ============================================================
  const SideNav = ({ tier, activeId, navOpen, setNavOpen }) => {
    const lvl = TIER[tier];
    const visible = SECTIONS.filter((s) => s.minTier <= lvl);

    const railList = (
      <nav aria-label="Section navigation">
        <div className="font-mono text-[11px] tabnum uppercase tracking-wide100 text-muted mb-3">
          {visible.length} sections · {TIER_LABEL[tier].name}
        </div>
        <ol className="space-y-1.5">
          {visible.map((s) => {
            const active = s.id === activeId;
            return (
              <li key={s.id}>
                <a
                  href={'#' + s.id}
                  onClick={() => setNavOpen(false)}
                  className={
                    'flex items-baseline gap-3 py-1 group ' +
                    (active ? 'text-ink' : 'text-muted hover:text-body')
                  }
                >
                  <span className={'font-mono text-[11px] tabnum w-6 ' + (active ? 'text-accent' : '')}>
                    {s.num}
                  </span>
                  <span className="font-display text-sm leading-snug">{s.title}</span>
                </a>
              </li>
            );
          })}
        </ol>
        <div className="rule mt-6 pt-4 text-xs text-muted leading-relaxed">
          A measured strategy memo, not a pitch. Confidence on diagnosis, humility on prescription.
        </div>
      </nav>
    );

    return (
      <>
        {/* Desktop rail */}
        <aside className="hidden md:block sticky top-14 self-start max-h-[calc(100vh-3.5rem)] overflow-y-auto py-12 pr-6">
          {railList}
        </aside>

        {/* Mobile modal */}
        {navOpen && (
          <div
            className="md:hidden fixed inset-0 z-40 bg-bg/95 backdrop-blur-md p-6 overflow-y-auto"
            role="dialog"
            aria-modal="true"
          >
            <div className="flex items-center justify-between mb-6">
              <span className="font-display font-bold text-ink">Sections</span>
              <button
                onClick={() => setNavOpen(false)}
                className="px-3 py-1.5 rounded border border-line text-body text-sm"
              >
                Close
              </button>
            </div>
            {railList}
          </div>
        )}
      </>
    );
  };

  // ============================================================
  // HERO STATS — four headline numbers with source attribution
  // ============================================================
  const HERO_STATS = [
    {
      n: '500M+',
      label: "users on Hiya's network globally",
      source: 'Hiya / Crunchbase',
    },
    {
      n: '86%',
      label: 'of unidentified calls go unanswered',
      source: 'State of the Call 2026',
    },
    {
      n: 'Up to 50%',
      label: 'answer-rate lift cited for Branded Call',
      source: 'Hiya / O2 Telef\u00f3nica, Feb 2026',
    },
    {
      n: '~100%',
      label: 'of UK mobile post-Vodafone launch',
      source: 'Vodafone, Mar 2026',
    },
  ];

  // ============================================================
  // READING-TIME NAVIGATOR — three cards, each also acts as a tier toggle
  // ============================================================
  const READING_TIERS = [
    {
      action:   'quick',
      time:     '3 min',
      sections: "\u00a701, \u00a702 (one-liners), \u00a714 (compact)",
    },
    {
      action:   'strategist',
      time:     '15 min',
      sections: "\u00a701, 02 (mechanism), 03, 05, 06, 11, 12, 14",
    },
    {
      action:   'full',
      time:     'Full Read',
      sections: 'All 14 sections, including hypothesis four-lens, segments, and the calculator',
    },
  ];

  // ============================================================
  // SECTION 01 — Hero / TL;DR
  // Renders at every tier; depth scales with tier.
  // ============================================================
  const Hero = ({ sec, tier, setTier }) => {
    return (
      <section id={sec.id} className="scroll-mt-24 hero-radial -mx-5 md:-mx-8 px-5 md:px-8 pt-10 md:pt-16 pb-16 md:pb-20">
        {/* Kicker: role + company + date */}
        <div className="font-mono text-xs tabnum text-muted/80 tracking-wide25">
          Principal Product Manager Brief · Prepared for Hiya · May 2026
        </div>

        <div className="mt-5">
          <Eyebrow num={sec.num} label="TL;DR" />
        </div>

        {/* H1 — ~28 words, strong + leak + framework, no aphorism */}
        <h1 className="mt-6 font-display font-bold text-ink tracking-tight25 text-3xl md:text-4xl lg:text-5xl leading-[1.1] max-w-4xl">
          Hiya's distribution at carrier and OEM scale is the moat. The wedge for this role is enterprise activation pull-through: monetizing the network rather than rebuilding it.
        </h1>

        {/* Paragraph 1 — who I am */}
        <p className="mt-10 max-w-2xl text-body text-base md:text-lg leading-relaxed">
          Senior product leader. 18 years on subscription, billing, lifecycle, and engagement platforms at Amazon Prime and T-Mobile. At Prime (L7), I owned the global benefit-activation platform across 26 country PM teams, associated with +23% renewals and 30M+ monthly benefit utilizations. Earlier at T-Mobile, Billing & Benefits became the #1 digital property by MAU: +204% one-time payment completion, +76% recurring setup, +23% CLV, 43% reduction in billing-related care calls. Currently on a stabilized caregiving break, with daily AI tooling practice across Claude Code, Codex, and ChatGPT.
        </p>

        {/* Paragraph 2 — what this brief is */}
        <p className="mt-6 max-w-2xl text-body text-base md:text-lg leading-relaxed">
          This brief is a measured strategy memo, not a pitch. It works from public sources to diagnose where Hiya's enterprise SaaS opportunity sits as three forces collide on the trust layer of business calling: the delivery layer standardizing on CTIA BCID, the network reach expanding materially in spring 2026, and the product surface shifting from identity to automation. The hypotheses below are held in parallel until the first 30 days resolve them. Where I lack internal data, I name the gap rather than guess.
        </p>

        {/* TL;DR thesis box — diagnosis / leak / whitespace */}
        <div className="mt-8 max-w-3xl border border-line/60 rounded-lg bg-surface/40 p-5 md:p-6">
          <div className="font-mono text-[11px] tabnum uppercase tracking-wide100 text-accent flex items-center gap-2">
            <Dot /> If you only read three lines
          </div>
          <ol className="mt-4 space-y-3.5 text-body text-sm md:text-base leading-relaxed">
            <li className="flex gap-3">
              <span className="font-mono text-accent tabnum text-[11px] mt-1.5 shrink-0">01</span>
              <span>
                <span className="text-ink font-semibold">Diagnosis.</span>{' '}
                Hiya's distribution at carrier and OEM scale is the asymmetric moat: Samsung through 2028, Vodafone UK at ~100% coverage, 90%+ of Germany via O2 Telef&oacute;nica and Deutsche Telekom. Free Protect feeds the network while paid Connect monetizes the businesses.
              </span>
            </li>
            <li className="flex gap-3">
              <span className="font-mono text-accent tabnum text-[11px] mt-1.5 shrink-0">02</span>
              <span>
                <span className="text-ink font-semibold">Leak.</span>{' '}
                The activation funnel from free Caller Reputation (launched Sep 30, 2025 with AT&amp;T) into paid Hiya Connect is the most plausible place compounding is being left on the table, since carrier reach just expanded faster than enterprise activation typically follows.
              </span>
            </li>
            <li className="flex gap-3">
              <span className="font-mono text-accent tabnum text-[11px] mt-1.5 shrink-0">03</span>
              <span>
                <span className="text-ink font-semibold">Whitespace.</span>{' '}
                The wedge for this role is enterprise activation pull-through across one or more of: Caller Reputation as activation engine, Voice AI Agents beta-to-GA packaging, or localized enterprise activation in the newly-lit carrier markets.
              </span>
            </li>
          </ol>
        </div>

        {/* Four headline stats from HERO_STATS, with source attribution */}
        <div className="mt-12 grid grid-cols-2 md:grid-cols-4 gap-5 md:gap-6">
          {HERO_STATS.map((s, i) => (
            <div key={i}>
              <div className="font-mono text-2xl md:text-3xl tabnum text-accent leading-none">{s.n}</div>
              <div className="mt-3 text-sm text-body leading-snug">{s.label}</div>
              <div className="mt-1.5 font-mono text-[10px] tabnum text-muted/80 leading-snug">{s.source}</div>
            </div>
          ))}
        </div>

        {/* Reading-time navigator cards — also act as tier toggle */}
        <div className="mt-14">
          <div className="font-mono text-[11px] tabnum uppercase tracking-wide100 text-muted mb-4 flex items-center gap-2">
            <Dot /> Reading guide
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            {READING_TIERS.map((r, i) => {
              const active = tier === r.action;
              return (
                <button
                  key={i}
                  onClick={() => setTier(r.action)}
                  className={
                    'text-left p-4 rounded-lg border tier-btn ' +
                    (active
                      ? 'border-accent bg-accent/10 text-ink'
                      : 'border-line/60 bg-surface/30 text-body hover:border-accent/60')
                  }
                  aria-pressed={active}
                >
                  <div className="flex items-baseline justify-between">
                    <span className="font-display font-bold text-base">{r.time}</span>
                    <span
                      className={
                        'font-mono text-[10px] tabnum uppercase tracking-wide100 ' +
                        (active ? 'text-accent' : 'text-muted')
                      }
                    >
                      {active ? 'active' : 'tap'}
                    </span>
                  </div>
                  <div className="mt-3 text-xs text-muted leading-relaxed">{r.sections}</div>
                </button>
              );
            })}
          </div>
        </div>

        <div className="rule mt-16" />
      </section>
    );
  };

  // ============================================================
  // SECTION 03 — The Setup: three forces colliding
  // ============================================================
  const SETUP_CARDS = [
    {
      tag: 'The Standard',
      head: "The delivery layer of branded calling is standardizing on CTIA's BCID framework.",
      body: "CTIA's Branded Calling ID is consolidating as the US standard, with SecureG as the sole certificate authority. T-Mobile is already live; Verizon and AT&T are preparing launches. STIR/SHAKEN authentication is widely treated as a partial solution to spam labeling, since modern carrier labels rely heavily on behavioral signals (call volume, redial patterns, complaint rates) that authentication alone doesn't resolve.",
      stat: 'CTIA BCID · T-Mobile live, Verizon and AT&T preparing',
    },
    {
      tag: 'The Network',
      head: "Hiya's carrier reach expanded materially in spring 2026, ahead of typical enterprise activation cycles.",
      body: 'Vodafone UK launched in March 2026, covering nearly all of the UK mobile market. Deutsche Telekom (January 2026) and O2 Telef\u00f3nica (February 2026) together cover 90%+ of Germany. MasOrange added Spain in November 2025, on top of Telenor across Norway since February 2025. The Samsung partnership runs through 2028.',
      stat: 'Vodafone UK, Mar 2026 · ~100% UK coverage',
    },
    {
      tag: 'The Surface',
      head: 'The product surface is shifting from displaying who calls to automating the call itself.',
      body: 'Hiya launched Voice AI Agents in beta in August 2025, the category move from identity into voice automation. At Mobile World Congress in February 2026, Hiya reported 1 in 4 reviewed calls contain AI-generated audio. State of the Call 2026 (published April 14, 12,000+ consumers across six countries) shows 86% of consumers no longer answer unidentified calls, up from 80% in 2025.',
      stat: "State of the Call 2026 · 86% don't answer unidentified calls",
    },
  ];

  const Setup = ({ sec }) => (
    <SectionShell sec={sec}>
      <h2 className="font-display font-bold text-ink tracking-tight25 text-3xl md:text-4xl leading-tight">
        Three forces are colliding on the trust layer of business calling.
      </h2>
      <p className="mt-5 text-body max-w-3xl leading-relaxed">
        The four hypotheses in §02 are responses to three external forces, each of which moved in the last 18 months. Each force shifts what a Principal PM can plausibly own in the next 90 to 180 days. Each is documented enough in public material to anchor a discovery plan, but not enough to commit to a specific bet from outside the company.
      </p>

      <div className="mt-10 grid md:grid-cols-3 gap-5">
        {SETUP_CARDS.map((c, i) => (
          <article
            key={i}
            className="border border-line/60 rounded-lg p-6 bg-surface/40 flex flex-col"
          >
            <div className="font-mono text-[11px] tabnum uppercase tracking-wide100 text-accent flex items-center gap-2">
              <Dot /> {c.tag}
            </div>
            <h3 className="mt-4 font-display font-bold text-ink text-lg md:text-xl leading-snug">
              {c.head}
            </h3>
            <p className="mt-4 text-body text-sm leading-relaxed flex-grow">
              {c.body}
            </p>
            <div className="mt-5 pt-4 border-t border-line/40 font-mono text-[10px] tabnum uppercase tracking-wide100 text-muted">
              {c.stat}
            </div>
          </article>
        ))}
      </div>
    </SectionShell>
  );

  // ============================================================
  // SECTION 04 — The Analogy: SMS deliverability and 10DLC
  // Interactive 6-phase timeline; Phase 4 is the pivot, default selected.
  // ============================================================
  const ANALOGY_PHASES = [
    {
      num:          '1',
      shortTitle:   'Long codes',
      years:        '2012-2018',
      title:        'The Long-Codes Era',
      fullYears:    '~2012 to 2018',
      isPivot:      false,
      whatChanged:  'Businesses sent SMS through unregistered 10-digit numbers at flat per-message rates. No identity layer; no trust signal beyond the number itself.',
      buyerSide:    'Contact-center and marketing managers bought directly from SMS vendors. Friction was near zero.',
      economicSide: 'Flat per-message pricing. Low margins for carriers. Spam scaled with the channel.',
      voiceAnalog:  'Pre-STIR/SHAKEN voice, which is most calling for most of history.',
    },
    {
      num:          '2',
      shortTitle:   'Spam crisis',
      years:        '2017-2019',
      title:        'The Spam Crisis',
      fullYears:    '~2017 to 2019',
      isPivot:      false,
